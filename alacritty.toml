# general
[general]
# Import additional configuration files. Imports are loaded in order, skipping all missing files,
# with the importing file being loaded last. If a field is already present in a previous import,
# it will be replaced. All imports must either be absolute paths starting with /, paths relative
# to the user's home directory starting with ~/, or paths relative from the current config file.
import = []

# Directory the shell is started in. When this is unset, or "None", the working directory of the
# parent process will be used.
working_directory = "None"

# Live config reload (changes require restart)
live_config_reload = true

# Offer IPC using alacritty msg
ipc_socket = true

# env
[env]

# window
[window]
# Window dimensions (changes require restart). Number of lines/columns (not pixels) in the
# terminal. Both lines and columns must be non-zero for this to take effect. The number of columns
# must be at least 2, while using a value of 0 for columns and lines will fall back to the window
# manager's recommended size
dimensions = { columns = 0, lines = 0 }

# Window startup position. Specified in number of pixels. If the position is "None", the window
# manager will handle placement.
position = "None"

# Blank space added around the window in pixels. This padding is scaled by DPI and the specified
# value is always added at both opposing sides.
padding = { x = 0, y = 0 }

# Spread additional padding evenly around the terminal content.
dynamic_padding = false

# Window decorations. Full Borders and title bar. None Neither borders nor title bar. Transparent
# (macOS only) Title bar, transparent background and title bar buttons. Buttonless (macOS only)
# Title bar, transparent background and no title bar buttons.
decorations = "Full"

# Background opacity as a floating point number from 0.0 to 1.0. The value 0.0 is completely
# transparent and 1.0 is opaque.
opacity = 1.0

# Request compositor to blur content behind transparent windows.
blur = false

# Startup mode (changes require restart) Windowed Regular window. Maximized The window will be
# maximized on startup. Fullscreen The window will be fullscreened on startup. SimpleFullscreen
# (macOS only) Same as Fullscreen, but you can stack windows on top.
startup_mode = "Windowed"

# Window title.
title = "Alacritty"

# Allow terminal applications to change Alacritty's window title.
dynamic_title = true

# Window class. On Wayland, general is used as _app\_id_ and instance is ignored.
class = { instance = "Alacritty", general = "Alacritty" }

# Override the variant of the System theme/GTK theme/Wayland client side decorations. Set this to
# "None" to use the system's default theme variant.
decorations_theme_variant = "None"

# Prefer resizing window by discrete steps equal to cell dimensions.
resize_increments = false

# Make Option key behave as Alt.
option_as_alt = "None"

# Sets window level. Normal Window adheres to system's default z-order. AlwaysOnTop Window is a
# toplevel window.
level = "Normal"

# scrolling
[scrolling]
# Maximum number of lines in the scrollback buffer. Specifying 0 will disable scrolling. Limited
# to 100000.
history = 10000

# Number of line scrolled for every input scroll increment.
multiplier = 3

# font
[font]
normal = { family = "monospace", style = "Regular" }

# If the family is not specified, it will fall back to the value specified for the normal font.
bold = { style = "Bold" }

# If the family is not specified, it will fall back to the value specified for the normal font.
italic = { style = "Italic" }

# If the family is not specified, it will fall back to the value specified for the normal font.
bold_italic = { style = "Bold Italic" }

# Font size in points.
size = 11.25

# Offset is the extra space around each character. y can be thought of as modifying the line
# spacing, and x as modifying the letter spacing.
offset = { x = 0, y = 0 }

# Glyph offset determines the locations of the glyphs within their cells with the default being at
# the bottom. Increasing x moves the glyph to the right, increasing y moves the glyph upward.
glyph_offset = { x = 0, y = 0 }

# When true, Alacritty will use a custom built-in font for box drawing characters (Unicode points
# U+2500 - U+259F), legacy computing symbols (U+1FB00 - U+1FB3B), and powerline symbols (U+E0B0 -
# U+E0B3).
builtin_box_drawing = true

# colors
[colors]
# Colors which should be used to draw the terminal cursor. Allowed values are hexadecimal colors
# like #ff00ff, or CellForeground/CellBackground, which references the affected cell.
cursor = { text = "CellBackground", cursor = "CellForeground" }

# Colors for the cursor when the vi mode is active. Allowed values are hexadecimal colors like
# #ff00ff, or CellForeground/CellBackground, which references the affected cell.
vi_mode_cursor = { text = "CellBackground", cursor = "CellForeground" }

# Color used for the indicator displaying the position in history during search and vi mode.
# Setting this to "None" will use the opposing primary color.
line_indicator = { foreground = "None", background = "None" }

# Color used for the footer bar on the bottom, used by search regex input, hyperlink URI preview,
# etc.
footer_bar = { foreground = "#181818", background = "#d8d8d8" }

# Colors used for drawing selections. Allowed values are hexadecimal colors like #ff00ff, or
# CellForeground/CellBackground, which references the affected cell.
selection = { text = "CellBackground", background = "CellForeground" }

# The indexed colors include all colors from 16 to 256. When these are not set, they're filled
# with sensible defaults.
indexed_colors = []

# Whether or not window.opacity applies to all cell backgrounds, or only to the default
# background. When set to true all cells will be transparent regardless of their background color.
transparent_background_colors = false

# When true, bold text is drawn using the bright color variants.
draw_bold_text_with_bright_colors = false

# colors.primary
[colors.primary]
foreground = "#d8d8d8"

background = "#181818"

# If this is not set, the color is automatically calculated based on the foreground color.
dim_foreground = "#828482"

# This color is only used when _draw\_bold\_text\_with\_bright\_colors_ is true. If this is not
# set, the normal foreground will be used.
bright_foreground = "None"

# colors.search
[colors.search]
matches = { foreground = "#181818", background = "#ac4242" }

focused_match = { foreground = "#181818", background = "#f4bf75" }

# colors.hints
[colors.hints]
# First character in the hint label. Allowed values are hexadecimal colors like #ff00ff, or
# CellForeground/CellBackground, which references the affected cell.
start = { foreground = "#181818", background = "#f4bf75" }

# All characters after the first one in the hint label. Allowed values are hexadecimal colors like
# #ff00ff, or CellForeground/CellBackground, which references the affected cell.
end = { foreground = "#181818", background = "#ac4242" }

# colors.normal
[colors.normal]
black = "#181818"

red = "#ac4242"

green = "#90a959"

yellow = "#f4bf75"

blue = "#6a9fb5"

magenta = "#aa759f"

cyan = "#75b5aa"

white = "#d8d8d8"

# colors.bright
[colors.bright]
black = "#6b6b6b"

red = "#c55555"

green = "#aac474"

yellow = "#feca88"

blue = "#82b8c8"

magenta = "#c28cb8"

cyan = "#93d3c3"

white = "#f8f8f8"

# colors.dim
[colors.dim]
black = "#0f0f0f"

red = "#712b2b"

green = "#5f6f3a"

yellow = "#a17e4d"

blue = "#456877"

magenta = "#704d68"

cyan = "#4d7770"

white = "#8e8e8e"

# bell
[bell]
# Visual bell animation effect for flashing the screen when the visual bell is rung.
animation = "Linear"

# Duration of the visual bell flash in milliseconds. A `duration` of `0` will disable the visual
# bell animation.
duration = 0

# Visual bell animation color.
color = "#ffffff"

# This program is executed whenever the bell is rung. When set to "None", no command will be
# executed.
command = "None"

# selection
[selection]
# This string contains all characters that are used as separators for "semantic words" in
# Alacritty.
semantic_escape_chars = ",\u2502`|:\"' ()[]{}<>\t"

# When set to true, selected text will be copied to the primary clipboard.
save_to_clipboard = false

# cursor
[cursor]
style = { shape = "Block", blinking = "Off" }

# If the vi mode cursor style is "None" or not specified, it will fall back to the active value of
# the normal cursor.
vi_mode_style = "None"

# Cursor blinking interval in milliseconds.
blink_interval = 750

# Time after which cursor stops blinking, in seconds. Specifying 0 will disable timeout for
# blinking.
blink_timeout = 5

# When this is true, the cursor will be rendered as a hollow box when the window is not focused.
unfocused_hollow = true

# Thickness of the cursor relative to the cell width as floating point number from 0.0 to 1.0.
thickness = 0.15

# terminal
[terminal]
# You can set shell.program to the path of your favorite shell, e.g. /bin/zsh. Entries in
# shell.args are passed as arguments to the shell.
# shell = "$SHELL"
# Default is resolved by Alacritty: $SHELL or the user's login shell, if $SHELL is unset.

# Controls the ability to write to the system clipboard with the OSC 52 escape sequence. While
# this escape sequence is useful to copy contents from the remote server, allowing any application
# to read from the clipboard can be easily abused while not providing significant benefits over
# explicitly pasting text.
osc52 = "OnlyCopy"

# mouse
[mouse]
# When this is true, the cursor is temporarily hidden when typing.
hide_when_typing = false

# See keyboard.bindings for full documentation on mods, mode, command, chars, and action. When an
# application running within Alacritty captures the mouse, the `Shift` modifier can be used to
# suppress mouse reporting. If no action is found for the event, actions for the event without the
# `Shift` modifier are triggered instead.
bindings = [
  { mouse = "Right", action = "ExpandSelection" },
  { mouse = "Right", mods = "Control", action = "ExpandSelection" },
  { mouse = "Middle", mode = "~Vi", action = "PasteSelection" }
]

# hints
[hints]
# Keys used for the hint labels.
alphabet = "jfkdls;ahgurieowpq"

# Array with all available hints. Each hint must have at least one of regex or hyperlinks and
# either an action or a command.
enabled = [
  { command = "xdg-open", hyperlinks = true, post_processing = true, persist = false, mouse = { enabled = true }, binding = { key = "O", mods = "Control|Shift" }, regex = "(ipfs:|ipns:|magnet:|mailto:|gemini://|gopher://|https://|http://|news:|file:|git://|ssh:|ftp://)[^\\u0000-\\u001F\\u007F-\\u009F<>\"\\s{-}\\^\u27e8\u27e9`\\\\]+" }
]

# keyboard
[keyboard]
# To unset a default binding, you can use the action "ReceiveChar" to remove it or "None" to
# inhibit any action. Multiple keybindings can be triggered by a single key press and will be
# executed in the order they are defined in.
bindings = [
  { key = "Paste", action = "Paste" },
  { key = "Copy", action = "Copy" },
  { key = "L", mods = "Control", action = "ClearLogNotice" },
  { key = "Paste", mode = "Vi|Search", action = "Paste" },
  { key = "L", mods = "Control", mode = "~Vi|~Search", chars = "\f" },
  { key = "PageUp", mods = "Shift", mode = "~Alt", action = "ScrollPageUp" },
  { key = "PageDown", mods = "Shift", mode = "~Alt", action = "ScrollPageDown" },
  { key = "Home", mods = "Shift", mode = "~Alt", action = "ScrollToTop" },
  { key = "End", mods = "Shift", mode = "~Alt", action = "ScrollToBottom" },
  { key = "Space", mods = "Shift|Control", mode = "~Search", action = "ToggleViMode" },
  { key = "Space", mods = "Shift|Control", mode = "Vi|~Search", action = "ScrollToBottom" },
  { key = "Escape", mode = "Vi|~Search", action = "ClearSelection" },
  { key = "I", mode = "Vi|~Search", action = "ToggleViMode" },
