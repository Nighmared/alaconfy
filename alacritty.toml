# debug
[debug]
# Display the time it takes to draw each frame.
render_timer = false

# Keep the log file after quitting Alacritty.
persistent_logging = false

log_level = "Warn"

# Force use of a specific renderer, "None" will use the highest available one.
renderer = "None"

# Log all received window events.
print_events = false

# Highlight window damage information.
highlight_damage = false

# Use EGL as display API if the current platform allows it. Note that transparency may not work
# with EGL on Linux/BSD.
prefer_egl = false
